calculation:
  type: md
  driver: ase
  init_structure: inputs/init.traj
  ensemble: nvt
  algorithm: langevin
  steps: 10
  timestep_fs: 0.5
  temperature_K: 300.0
  friction_fs_inv: 0.01
  trajectory: md_li_si_abacus_ase.traj
  logfile: md_li_si_abacus_ase.log
  summary_file: md_li_si_abacus_ase_summary.json
  final_structure: md_li_si_abacus_ase_final.traj
  postprocess:
    summary:
      enabled: true
      output: md_li_si_abacus_ase_post_summary.json
    convert:
      enabled: false
      format: extxyz
      output_prefix: md_li_si_abacus_ase_post

calculator:
  name: abacus
  abacus:
    command: abacus
    mpi: 4
    omp: 1
    directory: run_md_ase_abacus
    kpts: [2, 2, 2]
    parameters:
      calculation: scf
      basis_type: lcao
      ks_solver: cusolver
      dft_functional: pbe
      ecutwfc: 100
      scf_thr: 1e-6
      scf_nmax: 100
      smearing_method: gaussian
      smearing_sigma: 0.001
      mixing_type: broyden
      cal_force: 1
      cal_stress: 1
      init_wfc: atomic
      init_chg: atomic
      pseudo_dir: ../data
      orbital_dir: ../data
      pseudopotentials:
        Li: Li_ONCV_PBE-1.2.upf
        Si: Si_ONCV_PBE-1.2.upf
      basissets:
        Li: Li_gga_8au_100Ry_4s1p.orb
        Si: Si_gga_8au_100Ry_2s2p1d.orb
