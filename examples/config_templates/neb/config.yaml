calculation:
  type: neb
  init_chain: init_neb_chain.traj
  climb: true
  fmax: 0.05
  k: 0.1
  algorism: improvedtangent # Options: improvedtangent, aseneb, eb
  parallel: true
  optimizer: FIRE # Options: FIRE, BFGS

abacus:
  # MPI Configuration Examples:
  # 1. Standard mpirun (Default if command doesn't contain '{mpi}'):
  #    command: abacus
  #    mpi: 4
  #    -> Runs: mpirun -np 4 abacus
  #
  # 2. Slurm srun (Recommended for Slurm clusters):
  #    command: "srun -n {mpi} --exclusive abacus"
  #    mpi: 4
  #    -> Runs: srun -n 4 --exclusive abacus
  #
  # 3. Custom mpirun (e.g., with core binding):
  #    command: "mpirun --bind-to core -np {mpi} abacus"
  #    mpi: 4
  #    -> Runs: mpirun --bind-to core -np 4 abacus
  
  command: abacus
  mpi: 4
  omp: 1
  directory: run_neb
  parameters:
    calculation: scf
    nspin: 2
    xc: pbe
    ecutwfc: 100
    ks_solver: genelpa
    smearing_method: gaussian
    smearing_sigma: 0.001
    basis_type: lcao
    mixing_type: broyden
    scf_thr: 1.0e-6
    scf_nmax: 100
    kpts: [2, 1, 2]
    pp:
      C: C_ONCV_PBE-1.0.upf
      H: H_ONCV_PBE-1.0.upf
      Pt: Pt_ONCV_PBE-1.0.upf
    basis:
      C: C_gga_7au_100Ry_2s2p1d.orb
      H: H_gga_6au_100Ry_2s1p.orb
      Pt: Pt_gga_7au_100Ry_4s2p2d1f.orb
    pseudo_dir: "/path/to/PP"
    basis_dir: "/path/to/ORB"
    cal_force: 1
    cal_stress: 1 # Required for variable cell, but AbacusNEB handles it
