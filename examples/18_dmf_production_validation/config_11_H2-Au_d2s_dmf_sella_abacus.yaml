calculation:
  type: sella
  init_structure: runs/08_H2-Au_d2s_dmf_irc/ts.extxyz
  fmax: 0.10
  max_steps: 40
  trajectory: runs/11_H2-Au_d2s_dmf_sella_abacus/sella.traj
  directory: runs/11_H2-Au_d2s_dmf_sella_abacus/SELLA
  eta: 0.002
  order: 1

calculator:
  name: abacus
  abacus:
    command: abacus
    mpi: 4
    omp: 1
    directory: runs/11_H2-Au_d2s_dmf_sella_abacus/ABACUS
    kpts: [3, 1, 3]
    parameters:
        calculation: scf
        ecutwfc: 100
        basis_type: lcao
        ks_solver: cusolver
        vdw_method: d3_bj
        nspin: 2
        dft_functional: pbe
        symmetry: 1
        scf_thr: 1e-07
        scf_nmax: 300
        smearing_method: mp
        smearing_sigma: 0.002
        mixing_type: broyden
        mixing_ndim: 20
        cal_force: 1
        cal_stress: 0
        init_wfc: atomic
        init_chg: atomic
        out_stru: 1
        out_chg: -1
        out_mul: 1
        out_bandgap: 1
        out_wfc_lcao: 0
        efield_flag: 1
        dip_cor_flag: 1
        efield_dir: 1
        pseudo_dir: ../data
        orbital_dir: ../data
        pseudopotentials:
           H: H_ONCV_PBE-1.0.upf
           Au: Au_ONCV_PBE-1.0.upf
        basissets:
           H: H_gga_6au_100Ry_2s1p.orb
           Au: Au_gga_7au_100Ry_4s2p2d1f.orb
