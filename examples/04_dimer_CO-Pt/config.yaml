calculation:
  type: dimer
  init_structure: inputs/dimer_init.traj
  fmax: 0.05
  max_steps: 200
  trajectory: dimer.traj
  init_eigenmode_method: displacement
  displacement_vector: inputs/displacement_vector.npy

calculator:
  name: abacus
  abacus:
    command: abacus
    mpi: 4
    omp: 1
    directory: dimer_run
    kpts: [3, 1, 3]
    parameters:
        calculation: scf
        ecutwfc: 100
        basis_type: lcao
        ks_solver: cusolver
        vdw_method: d3_bj
        nspin: 2
        dft_functional: pbe
        symmetry: 0
        scf_thr: 1e-07
        scf_nmax: 300
        smearing_method: mp
        smearing_sigma: 0.002
        mixing_type: broyden
        mixing_ndim: 20
        cal_force: 1
        cal_stress: 1
        init_wfc: atomic
        init_chg: atomic
        out_stru: 1
        out_chg: -1
        out_mul: 1
        out_bandgap: 1
        out_wfc_lcao: 0
        efield_flag: 1
        dip_cor_flag: 1
        efield_dir: 1
        pseudo_dir: ../data
        orbital_dir: ../data
        pseudopotentials:
           C: C_ONCV_PBE-1.0.upf
           O: O_ONCV_PBE-1.0.upf
           Pt: Pt_ONCV_PBE-1.0.upf
        basissets:
           C: C_gga_7au_100Ry_2s2p1d.orb
           O: O_gga_7au_100Ry_2s2p1d.orb
           Pt: Pt_gga_7au_100Ry_4s2p2d1f.orb
