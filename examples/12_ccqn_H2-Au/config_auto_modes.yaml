calculation:
  type: ccqn
  init_structure: inputs/ccqn_init.stru
  fmax: 0.05
  max_steps: 2
  trajectory: ccqn_auto_modes.traj
  logfile: ccqn_auto_modes.log
  final_structure: ccqn_auto_modes_final.extxyz
  artifact_manifest: atst_artifacts_auto_modes.json
  e_vector_method: ic
  auto_reactive_bonds:
    enabled: true
    molecule_indices: "1-2"
    active_catalyst_indices: "3-66"
    cutoff_A: 3.5
    max_modes: 8
    max_bonds_per_mode: 1
  mode_manifest: ccqn_auto_modes_mode_manifest.json
  diagnostics_file: ccqn_auto_diagnostics.json
  ic_mode: democratic
  cos_phi: 0.5
  trust_radius_uphill: 0.05
  trust_radius_saddle_initial: 0.03
  accept_initial_converged: false
  directory: run_ccqn_auto_modes

calculator:
  name: abacus
  abacus:
    command: abacus
    mpi: 1
    omp: 8
    directory: run_ccqn_auto_modes
    kpts: [3, 1, 3]
    parameters:
        calculation: scf
        ecutwfc: 100
        basis_type: lcao
        ks_solver: cusolver
        vdw_method: d3_bj
        nspin: 2
        dft_functional: pbe
        symmetry: 1
        scf_thr: 1e-07
        scf_nmax: 300
        smearing_method: mp
        smearing_sigma: 0.002
        mixing_type: broyden
        mixing_ndim: 20
        cal_force: 1
        cal_stress: 0
        init_wfc: atomic
        init_chg: atomic
        out_stru: 1
        out_chg: -1
        out_mul: 1
        out_bandgap: 1
        out_wfc_lcao: 0
        efield_flag: 1
        dip_cor_flag: 1
        efield_dir: 1
        pseudo_dir: ../data
        orbital_dir: ../data
        pseudopotentials:
           H: H_ONCV_PBE-1.0.upf
           Au: Au_ONCV_PBE-1.0.upf
        basissets:
           H: H_gga_6au_100Ry_2s1p.orb
           Au: Au_gga_7au_100Ry_4s2p2d1f.orb
