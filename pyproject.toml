[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "atst-tools"
version = "2.0.0"
description = "Advanced ASE Transition State Tools for ABACUS and Deep-Potential"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "ase>=3.22.1",
    "numpy",
    "scipy",
    "matplotlib",
    "ruamel.yaml",
    "seekpath",
    "sella",
]

[project.scripts]
atst-run = "atst_tools.scripts.main:main"
atst-neb-make = "atst_tools.scripts.neb_make:main"
atst-neb-post = "atst_tools.scripts.neb_post:main"

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
