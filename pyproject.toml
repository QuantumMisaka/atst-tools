[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "atst-tools"
version = "2.0.0"
description = "Advanced ASE Transition State Tools for ABACUS (and Deep-Potential)"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "LGPL-v3 License"}
authors = [
    {name = "JamesMisaka", email = "jamesmisaka@example.com"},
    {name = "QuantumMisaka", email = "quantummisaka@example.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Physics",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "numpy>=1.21.0",
    "scipy>=1.7.0",
    "matplotlib>=3.5.0",
    "ruamel.yaml>=0.17.0", # YAML parsing with comment preservation
    "ase>=3.22.1",         # Generic ASE dependency (Users must install ase-abacus manually)
    "sella>=2.3.0",        # Sella is now a core dependency
]

[project.optional-dependencies]
dp = ["deepmd-kit>=3.1.0"]
dev = [
    "pytest>=7.0.0",
    "black>=22.0.0",
    "isort>=5.10.0",
    "flake8>=4.0.0",
]

[project.scripts]
atst-run = "atst_tools.scripts.main:main"
atst-neb-make = "atst_tools.scripts.neb_make:main"
atst-neb-post = "atst_tools.scripts.neb_post:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["atst_tools*"]
namespaces = false

[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
