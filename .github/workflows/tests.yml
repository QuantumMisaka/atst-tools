name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ATST-Tools test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run unit tests
        run: |
          python -m pytest tests -q
