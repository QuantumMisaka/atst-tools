name: Publish Python package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or ref to publish, for example v2.0.1
        required: true
        default: v2.0.1

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release ref
        id: release_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify package version matches tag
        env:
          RELEASE_REF: ${{ steps.release_ref.outputs.ref }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          ref = os.environ["RELEASE_REF"]
          tag = ref.rsplit("/", 1)[-1]
          if not tag.startswith("v"):
              raise SystemExit(f"Release ref {tag!r} must be a v-prefixed tag")

          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]

          expected = tag[1:]
          if version != expected:
              raise SystemExit(
                  f"pyproject version {version!r} does not match release tag {tag!r}"
              )
          print(f"Publishing atst-tools {version}")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: python -m twine check --strict dist/*

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/atst-tools/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
